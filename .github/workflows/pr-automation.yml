name: Release Automation

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Считаем версию через GitVersion
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1

      # 2. Генерируем сгруппированные заметки релиза
      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.gitversion.outputs.semVer }}"
          
          # 1. Генерируем временный package.json для conventional-changelog
          echo "{\"name\": \"${{ github.event.repository.name }}\", \"version\": \"$VERSION\"}" > package.json
          
          # 2. Генерируем заметки (Angular) + линкуем Jira
          # Сравниваем последний тег с текущим состоянием
          npx -y conventional-changelog-cli -p angular -r 1 | sed -E 's|(VER-[0-9]+)|[\1](https://districtcyber.atlassian.net/browse/\1)|g' > notes.md
          
          {
            echo "notes<<EOF"
            cat notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 3. Публикация релиза (экшен сам создаст тег в GitHub)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
