name: Release Automation

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Считаем версию через GitVersion
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1

      # 2. Генерируем сгруппированные заметки релиза
      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.gitversion.outputs.semVer }}"
          V_VERSION="v$VERSION"
          
          # Проверяем, не существует ли уже такой тег
          if git rev-parse "$V_VERSION" >/dev/null 2>&1; then
            echo "Tag $V_VERSION already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # 1. Update package.json version locally so conventional-changelog uses it
          npm version $VERSION --no-git-tag-version --allow-same-version
          
          # 2. Generate notes BEFORE creating the local tag
          # This compares the last tag to the current state
          npx -y conventional-changelog-cli -p angular -r 1 | sed -E 's|(VER-[0-9]+)|[\1](https://districtcyber.atlassian.net/browse/\1)|g' > notes.md
          
          # 3. Create local tag for the release action (it will push it)
          git tag "$V_VERSION"
          
          {
            echo "notes<<EOF"
            cat notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 3. Публикация релиза
      - name: Create GitHub Release
        if: steps.release_notes.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
