name: PR Automation & Release

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog for PR
        id: changelog
        run: |
          # Get the list of commits between the base branch and the PR branch
          # Using git log to get subjects and bodies of commits not in base
          COMMITS=$(git log origin/${{ github.base_ref }}..origin/${{ github.head_ref }} --pretty=format:"* %s (%h)")
          
          if [ -z "$COMMITS" ]; then
            COMMITS="No new commits found."
          fi
          
          # Prepare the body
          BODY_HEADER="## 📝 Changes in this PR"
          BODY_FOOTER="\n\n---\n*Generated automatically by GitHub Actions*"
          
          # We need to handle multi-line strings for GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$BODY_HEADER"
            echo ""
            echo "$COMMITS"
            echo "$BODY_FOOTER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const changelog = `${{ steps.changelog.outputs.changelog }}`;
            const prNumber = context.payload.pull_request.number;
            const currentBody = context.payload.pull_request.body || "";
            
            // Marker to identify our automated section
            const markerStart = "<!-- CHANGELOG_START -->";
            const markerEnd = "<!-- CHANGELOG_END -->";
            const newContent = `${markerStart}\n${changelog}\n${markerEnd}`;
            
            let newBody;
            if (currentBody.includes(markerStart) && currentBody.includes(markerEnd)) {
              // Replace existing changelog section
              const regex = new RegExp(`${markerStart}[\\s\\S]*${markerEnd}`);
              newBody = currentBody.replace(regex, newContent);
            } else {
              // Append to the end or start
              newBody = currentBody ? `${currentBody}\n\n${newContent}` : newContent;
            }
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });

  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag, get all commits until now
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            # Get commits between previous tag and current tag
            COMMITS=$(git log ${PREVIOUS_TAG}..${{ github.ref }} --pretty=format:"* %s (%h)")
          fi
          
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false # We use our own generated notes
