name: Auto-fix Dependabot with Claude Code

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  fetch-and-fix:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch alerts
        id: fetch_alerts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Fetch Dependabot alerts
          gh api "repos/$REPO/dependabot/alerts?per_page=100&state=open" > dependabot_alerts.json
          
          # Fetch Code Scanning alerts (CodeQL)
          gh api "repos/$REPO/code-scanning/alerts?per_page=100&state=open" > code_scanning_alerts.json
          
          dep_count=$(jq '. | length' dependabot_alerts.json)
          code_count=$(jq '. | length' code_scanning_alerts.json)
          total=$((dep_count + code_count))
          
          echo "Found $dep_count Dependabot and $code_count Code Scanning alerts."
          echo "alerts_count=$total" >> $GITHUB_OUTPUT

      - name: Stop if no alerts
        if: steps.fetch_alerts.outputs.alerts_count == '0'
        run: |
          echo "No Dependabot alerts found. Exiting."

      - name: Process alerts and ask Claude for fixes
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p claude_requests
          
          # Function to process an alert file
          process_alert() {
            local type=$1      # "dependabot" or "code-scanning"
            local alert_file=$2
            
            num_alerts=$(jq '. | length' "$alert_file")
            for i in $(seq 0 $((num_alerts - 1))); do
              idx=$((i+1))
              alert=$(jq -c ".[$i]" "$alert_file")
              fname="claude_requests/${type}_${idx}"
              echo "$alert" > "${fname}.json"
              
              msg="You are an automated code assistant. Input is a GitHub ${type} alert JSON object. Produce a JSON object with fields: path, patch, summary."
              if [ "$type" = "code-scanning" ]; then
                msg="$msg Focus on fixing the logic of the code to resolve the vulnerability (e.g. sanitizing input, removing secrets). Use unified diff format with spaces for context."
              else
                msg="$msg Focus on updating the dependency version. Use unified diff format with spaces for context."
              fi
              
              {
                echo "$msg"
                echo "Here is the alert JSON:"
                echo "$alert"
              } > "${fname}.prompt"
              
              # Call Claude
              npx -y @anthropic-ai/claude-code@latest --print < "${fname}.prompt" > "${fname}.out" 2>/tmp/claude.err || {
                echo "Claude CLI failed for ${fname}"; continue
              }
              echo "Wrote ${fname}.out"
            done
          }
          
          process_alert "dependabot" "dependabot_alerts.json"
          process_alert "code-scanning" "code_scanning_alerts.json"

      - name: Apply patches, create branch & PRs
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          
          for f in claude_requests/*.out; do
            base="${f%.out}"
            meta="${base}.json"
            type=$(echo "$base" | cut -d'/' -f2 | cut -d'_' -f1)
            
            echo "Processing $type alert from $f"
            # Extract JSON produced by Claude (strip markdown code fences if present)
            cat "$f" | sed 's/^```json//;s/^```//' | sed '/^$/d' | sed -n '1,2000p' > tmp_claude.json
            jq . tmp_claude.json >/dev/null 2>&1 || { echo "Invalid JSON from claude for $f"; continue; }
            
            path=$(jq -r .path tmp_claude.json)
            patch=$(jq -r .patch tmp_claude.json)
            summary=$(jq -r .summary tmp_claude.json)
            
            # Extract key info from ORIGINAL meta
            alert_num=$(jq -r '.number' "$meta")
            package_name=$(jq -r '.dependency.package.name // .rule.name // "code"' "$meta")
            ghsa_id=$(jq -r '.security_advisory.ghsa_id // .rule.id // "scanned-vuln"' "$meta")
            
            if [ "$path" = "null" ] || [ -z "$patch" ] || [ "$path" = "" ]; then
              echo "No actionable patch for alert #${alert_num}"; continue
            fi
            
            pkg_slug=$(echo "$package_name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g')
            branch="auto/claude-fix-${type}-${alert_num}-${pkg_slug}"
            
            git checkout main
            git checkout -B "$branch"
            
            printf '%s\n' "$patch" > /tmp/patch.diff
            if git apply --whitespace=fix /tmp/patch.diff; then
              git add "$path"
              git commit -m "chore: claude fix [$type #${alert_num}]: $summary" || true
              git push --set-upstream origin "$branch" --force
              
              if ! gh pr view "$branch" >/dev/null 2>&1; then
                gh pr create --title "Claude Fix [${type}]: $summary" \
                             --body "Automated fix generated by Claude for ${type} alert #${alert_num} ($package_name). $ghsa_id" \
                             --base main --head "$branch" || true
              fi
            else
              echo "Patch apply failed for alert #${alert_num}"
              git apply --check /tmp/patch.diff || true
            fi
            git checkout main
          done

      - name: Done
        run: echo "Workflow completed."
