name: Auto-fix Dependabot with Claude Code

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  fetch-and-fix:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch Dependabot alerts
        id: fetch_alerts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Fetching Dependabot alerts for $REPO"
          gh api "repos/$REPO/dependabot/alerts?per_page=100" > dependabot_alerts.json
          
          # Check if we got an error message or an empty result
          if jq -e '.message' dependabot_alerts.json >/dev/null; then
            echo "Error from API: $(jq -r .message dependabot_alerts.json)"
            echo "alerts_count=0" >> $GITHUB_OUTPUT
          else
            alerts_count=$(jq '. | length' dependabot_alerts.json)
            echo "alerts_count=$alerts_count" >> $GITHUB_OUTPUT
            echo "Found $alerts_count alerts."
          fi

      - name: Stop if no alerts
        if: steps.fetch_alerts.outputs.alerts_count == '0'
        run: |
          echo "No Dependabot alerts found. Exiting."

      - name: Process alerts and ask Claude for fixes
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        run: |
          set -euo pipefail
          mkdir -p claude_requests
          i=0
          # iterate compact JSON alerts and call Claude CLI for each
          jq -c '.[]' dependabot_alerts.json | while IFS= read -r alert; do
            i=$((i+1))
            fname="claude_requests/alert_${i}"
            {
              echo "You are an automated code assistant. Input is a GitHub Dependabot alert JSON object. Produce a JSON object with these fields:"
              echo "- path: path to the file to modify (relative to repo root), e.g. package.json or requirements.txt"
              echo "- patch: a strictly valid unified diff (git apply compatible). IMPORTANT: Unchanged lines MUST start with a space, added lines with '+', and removed lines with '-'."
              echo "- summary: a one-line explanation of the change"
              echo ""
              echo "Output ONLY the JSON on stdout (no extra commentary). Here is the alert JSON:"
              echo "$alert"
            } > "${fname}.prompt"
            if ! npx -y @anthropic-ai/claude-code@latest --print < "${fname}.prompt" > "${fname}.out" 2>/tmp/claude.err; then
              echo "Claude CLI failed for ${fname}"; cat /tmp/claude.err || true; exit 1
            fi
            echo "Wrote ${fname}.out"
          done

      - name: Apply patches, create branch & PRs
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          idx=0
          for f in claude_requests/*.out; do
            idx=$((idx+1))
            echo "Processing $f"
            # Extract JSON produced by Claude (strip markdown code fences if present)
            cat "$f" | sed 's/^```json//;s/^```//' | sed '/^$/d' | sed -n '1,2000p' > tmp.json
            # Validate JSON
            jq . tmp.json >/dev/null 2>&1 || { echo "Invalid JSON from claude for $f"; cat $f; continue; }
            # Extract key info for branch and duplicate checks
            alert_num=$(jq -r '.number' tmp.json)
            ghsa_id=$(jq -r '.security_advisory.ghsa_id' tmp.json)
            package_name=$(jq -r '.dependency.package.name' tmp.json)
            
            if [ "$path" = "null" ] || [ -z "$patch" ]; then
              echo "No actionable patch for alert #${alert_num}"; continue
            fi
            
            # Clean package name for branch (lowercase, remove @ / etc)
            pkg_slug=$(echo "$package_name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g')
            branch="auto/claude-fix-${alert_num}-${pkg_slug}"
            echo "Working on alert #${alert_num} ($package_name) in branch $branch"
            
            # Start from main for every fix
            git checkout main
            git checkout -B "$branch"
            
            printf '%s\n' "$patch" > /tmp/patch.diff
            # Try to apply patch
            if git apply --whitespace=fix /tmp/patch.diff; then
              git add "$path"
              git commit -m "chore: claude auto-fix [alert #${alert_num}]: $summary" || true
              git push --set-upstream origin "$branch" --force
              
              # Find existing PR for THIS alert number (even if branch name is different)
              existing_pr=$(gh pr list --search "[alert #${alert_num}]" --json number,headRefName --jq '.[0]')
              
              if [ "$existing_pr" = "null" ] || [ -z "$existing_pr" ]; then
                gh pr create --title "Auto-fix [$ghsa_id]: $summary [alert #${alert_num}]" \
                             --body "Automated fix generated by Claude Code for Dependabot alert #${alert_num} ($package_name)." \
                             --base main --head "$branch" || true
              else
                pr_num=$(echo "$existing_pr" | jq -r .number)
                old_branch=$(echo "$existing_pr" | jq -r .headRefName)
                echo "PR #$pr_num for alert #${alert_num} already exists (branch: $old_branch)."
                # If the branch name is different (legacy), we've already push our fix to the NEW one, 
                # but it might be better to just let it be and manualy close old ones once.
              fi
            else
              echo "Patch apply failed for alert #${alert_num}"
              git apply --check /tmp/patch.diff || true
            fi
            git checkout main
          done

      - name: Done
        run: echo "Workflow completed."
