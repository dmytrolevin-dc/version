name: Auto-fix Dependabot with Claude Code

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC (optional)

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  fetch-and-fix:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch Dependabot alerts
        id: fetch_alerts
        run: |
          echo "Fetching Dependabot alerts for $REPO"
          curl -sS -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/dependabot/alerts?per_page=100" > dependabot_alerts.json
          jq '. | length' dependabot_alerts.json > alerts_count.txt || true
          echo "alerts_count=$(cat alerts_count.txt)" >> $GITHUB_OUTPUT

      - name: Stop if no alerts
        if: steps.fetch_alerts.outputs.alerts_count == '0'
        run: |
          echo "No Dependabot alerts found. Exiting."

      - name: Process alerts and ask Claude for fixes
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        run: |
          set -euo pipefail
          mkdir -p claude_requests
          i=0
          # iterate compact JSON alerts and call Claude CLI for each
          jq -c '.[]' dependabot_alerts.json | while IFS= read -r alert; do
            i=$((i+1))
            fname="claude_requests/alert_${i}"
            cat <<EOF > "${fname}.prompt"
            You are an automated code assistant. Input is a GitHub Dependabot alert JSON object. Produce a JSON object with these fields:
            - path: path to the file to modify (relative to repo root), e.g. package.json or requirements.txt
            - patch: a unified diff applying the fix (git apply friendly)
            - summary: a one-line explanation of the change

            Output ONLY the JSON on stdout (no extra commentary). Here is the alert JSON:
            $(echo "$alert")
EOF
            if ! npx -y @anthropic-ai/claude-code@latest --print < "${fname}.prompt" > "${fname}.out" 2>/tmp/claude.err; then
              echo "Claude CLI failed for ${fname}"; cat /tmp/claude.err || true; exit 1
            fi
            echo "Wrote ${fname}.out"
          done

      - name: Apply patches, create branch & PRs
        if: steps.fetch_alerts.outputs.alerts_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          idx=0
          for f in claude_requests/*.out; do
            idx=$((idx+1))
            echo "Processing $f"
            # Extract JSON produced by Claude
            cat "$f" | sed -n '1,2000p' > tmp.json
            # Validate JSON
            jq . tmp.json >/dev/null 2>&1 || { echo "Invalid JSON from claude for $f"; cat $f; exit 1; }
            path=$(jq -r .path tmp.json)
            patch=$(jq -r .patch tmp.json)
            summary=$(jq -r .summary tmp.json)
            if [ "$path" = "null" ] || [ -z "$patch" ]; then
              echo "No actionable patch for $f"; continue
            fi
            branch="auto/dependabot-fix-${idx}-$(date +%s)"
            git checkout -b "$branch"
            echo "$patch" > /tmp/patch.diff
            # Try to apply patch
            if git apply --whitespace=fix /tmp/patch.diff; then
              git add -A
              git commit -m "chore: dependabot auto-fix: $summary" || true
              git push --set-upstream origin "$branch"
              gh pr create --title "Auto-fix Dependabot: $summary" --body "Automated fixes generated by Claude Code CLI for Dependabot alert" --base main --head "$branch"
            else
              echo "Patch apply failed for $f"; git checkout -- . || true; git branch -D "$branch" || true
            fi
          done

      - name: Done
        run: echo "Workflow completed."
